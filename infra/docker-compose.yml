version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ghosteditor-postgres
    environment:
      POSTGRES_USER: ghosteditor
      POSTGRES_PASSWORD: ghosteditor_dev
      POSTGRES_DB: ghosteditor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghosteditor"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ghosteditor-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
